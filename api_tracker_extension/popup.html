<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API & DOM Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --border-color: #334155;
        }

        body {
            width: 480px;
            height: 550px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 12px 16px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        button.btn-clear {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.btn-clear:hover {
            background-color: var(--error-color);
            color: white;
            border-color: var(--error-color);
        }

        .tabs {
            display: flex;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .log-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 10px;
            font-size: 12px;
            transition: transform 0.1s;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            gap: 8px;
        }

        .method-badge {
            font-family: monospace;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            flex-shrink: 0;
        }

        .method-badge.GET { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .method-badge.POST { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .method-badge.PUT { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .method-badge.DELETE { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .method-badge.XHR { background-color: rgba(167, 139, 250, 0.2); color: #c084fc; }
        .method-badge.FETCH { background-color: rgba(251, 191, 36, 0.2); color: #fbbf24; }

        .status-badge {
            font-weight: 600;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .status-badge.success { background-color: rgba(16, 185, 129, 0.15); color: var(--success-color); }
        .status-badge.error { background-color: rgba(239, 68, 68, 0.15); color: var(--error-color); }

        .log-url {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
            color: var(--text-color);
        }

        .log-time {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .log-details {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .log-details.active {
            display: block;
        }

        .log-details pre {
            background-color: var(--bg-color);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 200px;
            font-family: monospace;
            font-size: 11px;
            margin: 4px 0;
            color: #38bdf8;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 80px;
            font-size: 13px;
        }

        /* Premium DOM changes layout */
        .badge {
            font-family: monospace;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            text-transform: uppercase;
            display: inline-block;
            margin-right: 4px;
        }
        .badge.text-change {
            background-color: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }
        .badge.attr-change {
            background-color: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
        }
        .badge.child-change {
            background-color: rgba(244, 63, 94, 0.2);
            color: #fb7185;
        }
        .dom-change-item {
            padding: 8px;
            margin-top: 6px;
            border-radius: 6px;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px dashed var(--border-color);
        }
        .dom-change-target {
            font-family: monospace;
            color: #e2e8f0;
            word-break: break-all;
            margin-top: 2px;
            margin-bottom: 4px;
            font-size: 10px;
            background: rgba(0,0,0,0.25);
            padding: 2px 6px;
            border-radius: 4px;
            display: block;
        }
        .diff-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
        }
        .diff-old {
            color: #fb7185;
            text-decoration: line-through;
            background-color: rgba(244, 63, 94, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            word-break: break-all;
            font-family: monospace;
            font-size: 10.5px;
        }
        .diff-new {
            color: #34d399;
            background-color: rgba(16, 185, 129, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            word-break: break-all;
            font-family: monospace;
            font-size: 10.5px;
        }
    </style>
</head>
<body>
    <header>
        <h1><span class="pulse"></span> Activity Tracker Dashboard</h1>
        <button class="btn-clear" id="clearBtn">Clear Logs</button>
    </header>

    <div class="tabs">
        <div class="tab active" data-target="api-tab">API Requests</div>
        <div class="tab" data-target="dom-tab">DOM Changes</div>
    </div>

    <div id="api-tab" class="tab-content active">
        <div id="apiList"></div>
    </div>

    <div id="dom-tab" class="tab-content">
        <div id="domList"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
